services:
  api-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.api-server
    container_name: chronos-api-server
    environment:
      CHRONOS_ENV: development
      CHRONOS_LOG_LEVEL: info
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: chronos
      POSTGRES_USER: chronos
      POSTGRES_PASSWORD: chronos
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ETCD_ENDPOINTS: http://etcd:2379
      CHRONOS_BEARER_TOKEN: dev-token
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      etcd:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "echo healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.scheduler
    container_name: chronos-scheduler
    environment:
      CHRONOS_ENV: development
      CHRONOS_LOG_LEVEL: info
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: chronos
      POSTGRES_USER: chronos
      POSTGRES_PASSWORD: chronos
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      ETCD_ENDPOINTS: http://etcd:2379
    ports:
      - "9091:9091"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      etcd:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "echo healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      CHRONOS_ENV: development
      CHRONOS_LOG_LEVEL: info
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: chronos
      POSTGRES_USER: chronos
      POSTGRES_PASSWORD: chronos
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      WORKER_CONCURRENCY: 8
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD-SHELL", "echo healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16
    container_name: chronos-postgres
    environment:
      POSTGRES_DB: chronos
      POSTGRES_USER: chronos
      POSTGRES_PASSWORD: chronos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronos -d chronos"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: chronos-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: chronos-redis
    ports:
      - "6379:6379"

  etcd:
    image: quay.io/coreos/etcd:v3.5.15
    container_name: chronos-etcd
    command:
      - /usr/local/bin/etcd
      - --name=etcd0
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
    ports:
      - "2379:2379"

  prometheus:
    image: prom/prometheus:latest
    container_name: chronos-prometheus
    volumes:
      - ./ops/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/observability/alerts/chronos-alerts.yml:/etc/prometheus/chronos-alerts.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: chronos-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./ops/observability/grafana/dashboards:/var/lib/grafana/dashboards

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.1
    container_name: chronos-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.1
    container_name: chronos-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.1
    container_name: chronos-filebeat
    user: root
    volumes:
      - ./ops/observability/elastic/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/log/chronos:/var/log/chronos:ro
    depends_on:
      - elasticsearch
      - kibana

volumes:
  postgres_data:
