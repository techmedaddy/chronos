apiVersion: apps/v1
kind: Deployment
metadata:
  name: chronos-worker
  namespace: chronos
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: chronos-worker
  template:
    metadata:
      labels:
        app: chronos-worker
    spec:
      containers:
        - name: worker
          image: chronos/worker:latest
          ports:
            - containerPort: 9092
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "echo ready"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "echo alive"]
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
