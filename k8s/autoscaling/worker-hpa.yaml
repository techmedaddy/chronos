apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chronos-worker-hpa
  namespace: chronos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chronos-worker
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: chronos_queue_depth
        target:
          type: AverageValue
          averageValue: "200"
