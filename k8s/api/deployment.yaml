apiVersion: apps/v1
kind: Deployment
metadata:
  name: chronos-api
  namespace: chronos
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: chronos-api
  template:
    metadata:
      labels:
        app: chronos-api
    spec:
      containers:
        - name: api
          image: chronos/api-server:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "echo ready"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "echo alive"]
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
